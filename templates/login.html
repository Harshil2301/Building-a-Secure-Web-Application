{% extends 'base.html' %}

{% block title %}Login - Secure Web App{% endblock %}

{% block content %}
    <h2>Welcome Back</h2>
    
    <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit">Sign In</button>
    </form>

    {% if github_enabled %}
    <div class="divider">or</div>
    <a href="{{ url_for('login_github') }}" style="text-decoration: none;">
        <button type="button" class="oauth-btn" style="width: 100%;">
            Sign in with GitHub
        </button>
    </a>
    {% endif %}

    <div class="links" style="margin-top: 15px;">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a>
    </div>
{% endblock %}
